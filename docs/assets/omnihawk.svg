    <path d="M924 348C985 353 1041 373 1087 405C1029 413 979 435 937 467C928 443 922 394 924 348Z" fill="url(#beakBottom)"/>
    <path d="M918 350L1078 407" stroke="#C26D17" stroke-opacity="0.45"/>
