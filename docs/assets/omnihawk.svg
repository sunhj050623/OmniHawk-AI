<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OmniHawk AI Banner</title>
  <desc id="desc">A clear hawk head with radar rings, representing global AI signal scanning and routing.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1340" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050F27"/>
      <stop offset="1" stop-color="#04142F"/>
    </linearGradient>
    <linearGradient id="radarRing" x1="280" y1="110" x2="280" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EF0D3"/>
      <stop offset="1" stop-color="#1897FF"/>
    </linearGradient>
    <linearGradient id="neck" x1="520" y1="190" x2="1030" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7AF7D9"/>
      <stop offset="0.45" stop-color="#43D8B4"/>
      <stop offset="1" stop-color="#1382FF"/>
    </linearGradient>
    <linearGradient id="beakTop" x1="884" y1="270" x2="1140" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD98A"/>
      <stop offset="1" stop-color="#FFA53D"/>
    </linearGradient>
    <linearGradient id="beakBottom" x1="922" y1="350" x2="1090" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFCF76"/>
      <stop offset="1" stop-color="#F2872E"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="28" y="24" width="1344" height="572" rx="30" fill="url(#bg)"/>
  <rect x="28" y="24" width="1344" height="572" rx="30" stroke="#234A76" stroke-opacity="0.55"/>

