    <circle cx="1042" cy="118" r="6" fill="#4FD7FF"/>
    <path d="M771 219L1087 224" stroke="#5EE6C8" stroke-opacity="0.38"/>
    <circle cx="1087" cy="224" r="6" fill="#7AFCD2"/>
    <path d="M792 255L1070 330" stroke="#5AA7FF" stroke-opacity="0.33"/>
    <circle cx="1070" cy="330" r="6" fill="#67B8FF"/>
    <path d="M772 304L1020 414" stroke="#4BE1B6" stroke-opacity="0.35"/>
    <circle cx="1020" cy="414" r="6" fill="#70FFD8"/>
