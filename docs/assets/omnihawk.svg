    <circle cx="280" cy="310" r="152" stroke="url(#radarRing)" stroke-width="2.2" stroke-opacity="0.52"/>
    <circle cx="280" cy="310" r="104" stroke="url(#radarRing)" stroke-width="2.2" stroke-opacity="0.44"/>
    <circle cx="280" cy="310" r="60" stroke="url(#radarRing)" stroke-width="2.2" stroke-opacity="0.35"/>
    <path d="M280 108V512M78 310H482" stroke="#4EDDBE" stroke-opacity="0.36"/>
    <path d="M280 310L412 178" stroke="#68F4DD" stroke-opacity="0.38"/>
