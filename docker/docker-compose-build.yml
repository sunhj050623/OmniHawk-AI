services:
  openhawk-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openhawk-ai
    restart: unless-stopped

    ports:
      - "127.0.0.1:${WEBSERVER_PORT:-8080}:${WEBSERVER_PORT:-8080}"

    volumes:
      - ../config:/app/config:ro
      - ../output:/app/output

    environment:
      - TZ=Asia/Shanghai
      # Web йҸҲе¶…е§ҹйҚЈ?      - WEBSERVER_PORT=${WEBSERVER_PORT:-8080}
      # й–«ж°ұз…ЎеЁ“зҠ»дәҫ
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL:-}
      - WEWORK_WEBHOOK_URL=${WEWORK_WEBHOOK_URL:-}
      - WEWORK_MSG_TYPE=${WEWORK_MSG_TYPE:-}
      # й–ӯоҶ»ж¬ўй–°е¶Үз–Ҷ
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-}
      # ntfyй–°е¶Үз–Ҷ
      - NTFY_SERVER_URL=${NTFY_SERVER_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      # Barkй–°е¶Үз–Ҷ
      - BARK_URL=${BARK_URL:-}
      # Slackй–°е¶Үз–Ҷ
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      # й–«ж°ұж•ӨWebhookй–°е¶Үз–Ҷ
      - GENERIC_WEBHOOK_URL=${GENERIC_WEBHOOK_URL:-}
      - GENERIC_WEBHOOK_TEMPLATE=${GENERIC_WEBHOOK_TEMPLATE:-}
      # AI й–°е¶Үз–Ҷй”ӣеқ…i_analysis йҚң?ai_translation йҚҸеҸҳйҹ©еҰҜвҖізҖ·й–°е¶Үз–Ҷй”ӣ?      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_BASE=${AI_API_BASE:-}
      # жқ©ж»…в–јзҖӣжЁәеҒҚй–°е¶Үз–Ҷй”ӣең«3 йҚҸз…ҺоҶҗйҚ—еҝҡоҶ…й”ӣ?      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-}
      # жқ©ж„Ҝо”‘еҰҜвҖізҙЎ
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - RUN_MODE=${RUN_MODE:-cron}
      - IMMEDIATE_RUN=${IMMEDIATE_RUN:-true}
  openhawk-ai-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: openhawk-ai-mcp
    restart: unless-stopped

    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-3333}:3333"

    volumes:
      - ../config:/app/config:ro
      - ../output:/app/output

    environment:
      - TZ=Asia/Shanghai
      - MCP_PORT=${MCP_PORT:-3333}
      - PANEL_CRONTAB_PATH=${PANEL_CRONTAB_PATH:-/app/output/panel_schedule.crontab}

