name: OmniHawk AI Crawler

on:
  schedule:
    - cron: "33 * * * *"
  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify required files
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: config/config.yaml is missing"
            exit 1
          fi

      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run omnihawk-ai

      - name: Build Pages site artifact
        run: |
          set -euo pipefail
          mkdir -p site
          touch site/.nojekyll
          if [ -f output/index.html ]; then
            cp output/index.html site/index.html
          else
            cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>OmniHawk AI · Online Demo</title>
              <style>
                :root { color-scheme: light dark; }
                body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 40px auto; max-width: 920px; padding: 0 16px; }
                a { color: #2563eb; }
                .card { border: 1px solid #d0d7de; border-radius: 14px; padding: 20px; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>OmniHawk AI</h1>
                <p>Scheduled crawler finished, but no static report was generated for this run.</p>
                <p>Please check workflow logs and storage configuration.</p>
              </div>
            </body>
          </html>
          HTML
          fi
          if [ -d output/html ]; then
            cp -r output/html site/html
          fi
          if [ -d output/news ]; then
            cp -r output/news site/news
          fi
          if [ -f output/ai_progress_items.json ]; then
            cp output/ai_progress_items.json site/ai_progress_items.json
          fi
          if [ -f output/ai_progress_seen.json ]; then
            cp output/ai_progress_seen.json site/ai_progress_seen.json
          fi
          if [ -f image.png ]; then
            cp image.png site/image.png
          fi
          if [ -f README.md ]; then
            cp README.md site/README.md
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
