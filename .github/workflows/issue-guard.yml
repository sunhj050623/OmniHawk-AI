name: Issue Guard

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]
  pull_request_review_comment:
    types: [created]

jobs:
  moderate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      models: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: AI moderation
        uses: github/ai-moderator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          spam-label: spam
          ai-label: ai-generated
          minimize-detected-comments: true
          enable-spam-detection: true
          enable-link-spam-detection: true
          enable-ai-detection: true

      - name: Spam defense
        uses: actions/github-script@v7
        with:
          script: |
            const MIN_ACCOUNT_AGE_DAYS = 7;
            const event = context.eventName;

            let username = "";
            let authorAssociation = "";
            let number = 0;
            let nodeId = "";
            let commentId = 0;
            let isIssue = false;
            let isPR = false;
            let isComment = false;

            if (event === "issues") {
              const issue = context.payload.issue;
              username = issue.user.login;
              authorAssociation = issue.author_association;
              number = issue.number;
              isIssue = true;
            } else if (event === "issue_comment") {
              const comment = context.payload.comment;
              username = comment.user.login;
              authorAssociation = comment.author_association;
              number = context.payload.issue.number;
              nodeId = comment.node_id;
              commentId = comment.id;
              isComment = true;
              isIssue = true;
            } else if (event === "pull_request") {
              const pr = context.payload.pull_request;
              username = pr.user.login;
              authorAssociation = pr.author_association;
              number = pr.number;
              isPR = true;
            } else if (event === "pull_request_review_comment") {
              const comment = context.payload.comment;
              username = comment.user.login;
              authorAssociation = comment.author_association;
              number = context.payload.pull_request.number;
              nodeId = comment.node_id;
              commentId = comment.id;
              isComment = true;
              isPR = true;
            }

            if (["OWNER", "MEMBER", "COLLABORATOR"].includes(authorAssociation)) {
              core.info(`Skip trusted author: ${username} (${authorAssociation})`);
              return;
            }

            const { data: user } = await github.rest.users.getByUsername({ username });
            const accountAgeDays = Math.floor((Date.now() - new Date(user.created_at)) / 86400000);
            const isNewAccount = accountAgeDays < MIN_ACCOUNT_AGE_DAYS;

            let shouldBlock = false;
            let reason = "";

            if (isNewAccount) {
              shouldBlock = true;
              reason = `new account (${accountAgeDays}d < ${MIN_ACCOUNT_AGE_DAYS}d)`;
            } else {
              let isSpam = false;
              if (isComment) {
                const { node } = await github.graphql(`
                  query($id: ID!) {
                    node(id: $id) {
                      ... on IssueComment { isMinimized }
                      ... on PullRequestReviewComment { isMinimized }
                    }
                  }
                `, { id: nodeId });
                isSpam = node?.isMinimized === true;
              } else {
                const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                  ...context.repo,
                  issue_number: number,
                });
                isSpam = labels.some((l) => l.name === "spam");
              }

              if (isSpam) {
                shouldBlock = true;
                reason = `spam detected (account age: ${accountAgeDays}d)`;
              }
            }

            if (!shouldBlock) {
              core.info(`${username} (${accountAgeDays}d): pass`);
              return;
            }

            core.info(`Blocking ${event} #${number} from ${username}: ${reason}`);

            const notice = isNewAccount
              ? [
                  `@${username} thanks for your interest in OmniHawk AI.`,
                  "",
                  `To reduce spam and bot abuse, this repository requires account age >= ${MIN_ACCOUNT_AGE_DAYS} days.`,
                  `Your account age is ${accountAgeDays} days, so this contribution was automatically blocked.`,
                  "",
                  "Please try again when your account is older, or contact maintainers from README channels.",
                ].join("\n")
              : [
                  `@${username} your content was flagged as spam by automated moderation and has been removed.`,
                  "",
                  "If this is a false positive, please contact maintainers from README channels.",
                ].join("\n");

            if (isComment) {
              if (isIssue) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: commentId,
                });
              } else {
                await github.rest.pulls.deleteReviewComment({
                  ...context.repo,
                  comment_id: commentId,
                });
              }
              return;
            }

            if (isIssue) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body: notice,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: number,
                state: "closed",
                state_reason: "not_planned",
              });
              await github.rest.issues.lock({
                ...context.repo,
                issue_number: number,
                lock_reason: "spam",
              });
              return;
            }

            if (isPR) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body: notice,
              });
              await github.rest.pulls.update({
                ...context.repo,
                pull_number: number,
                state: "closed",
              });
            }
